<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 600" fill="none">
  <!-- Open ring around the tree -->
  <circle cx="250" cy="240" r="190" stroke="#1F7A8C" stroke-width="6" fill="none" stroke-dasharray="0 60 1080" stroke-dashoffset="540" stroke-linecap="round" />

  <!-- Trunk -->
  <path d="M250 410 C 246 350, 250 300, 252 230" stroke="#1F7A8C" stroke-width="14" stroke-linecap="round" fill="none" />
  <path d="M250 410 C 260 370, 252 320, 248 280" stroke="#1F7A8C" stroke-width="10" stroke-linecap="round" fill="none" />

  <!-- Main branches -->
  <path d="M252 250 Q 220 200 170 170" stroke="#1F7A8C" stroke-width="6" fill="none" stroke-linecap="round" />
  <path d="M252 230 Q 290 180 350 160" stroke="#1F7A8C" stroke-width="6" fill="none" stroke-linecap="round" />
  <path d="M252 270 Q 200 240 150 220" stroke="#1F7A8C" stroke-width="5" fill="none" stroke-linecap="round" />
  <path d="M252 270 Q 310 240 370 230" stroke="#1F7A8C" stroke-width="5" fill="none" stroke-linecap="round" />
  <path d="M252 290 Q 220 290 180 290" stroke="#1F7A8C" stroke-width="5" fill="none" stroke-linecap="round" />
  <path d="M252 290 Q 290 290 320 290" stroke="#1F7A8C" stroke-width="5" fill="none" stroke-linecap="round" />

  <!-- Olive leaves (clusters) -->
  <g fill="#1F7A8C">
    <!-- left top -->
    <ellipse cx="160" cy="170" rx="14" ry="6" transform="rotate(-30 160 170)" />
    <ellipse cx="180" cy="155" rx="14" ry="6" transform="rotate(-20 180 155)" />
    <ellipse cx="140" cy="195" rx="14" ry="6" transform="rotate(-45 140 195)" />
    <ellipse cx="195" cy="190" rx="14" ry="6" transform="rotate(-10 195 190)" />
    <!-- right top -->
    <ellipse cx="360" cy="155" rx="14" ry="6" transform="rotate(30 360 155)" />
    <ellipse cx="340" cy="180" rx="14" ry="6" transform="rotate(20 340 180)" />
    <ellipse cx="380" cy="195" rx="14" ry="6" transform="rotate(40 380 195)" />
    <ellipse cx="320" cy="170" rx="14" ry="6" transform="rotate(10 320 170)" />
    <!-- left middle -->
    <ellipse cx="140" cy="220" rx="14" ry="6" transform="rotate(-15 140 220)" />
    <ellipse cx="170" cy="245" rx="14" ry="6" transform="rotate(-15 170 245)" />
    <ellipse cx="200" cy="220" rx="14" ry="6" transform="rotate(-15 200 220)" />
    <ellipse cx="125" cy="245" rx="14" ry="6" transform="rotate(-40 125 245)" />
    <!-- right middle -->
    <ellipse cx="360" cy="220" rx="14" ry="6" transform="rotate(15 360 220)" />
    <ellipse cx="335" cy="245" rx="14" ry="6" transform="rotate(15 335 245)" />
    <ellipse cx="305" cy="220" rx="14" ry="6" transform="rotate(15 305 220)" />
    <ellipse cx="385" cy="240" rx="14" ry="6" transform="rotate(40 385 240)" />
    <!-- low spread -->
    <ellipse cx="200" cy="285" rx="14" ry="6" transform="rotate(-10 200 285)" />
    <ellipse cx="170" cy="295" rx="14" ry="6" transform="rotate(-15 170 295)" />
    <ellipse cx="305" cy="285" rx="14" ry="6" transform="rotate(10 305 285)" />
    <ellipse cx="335" cy="295" rx="14" ry="6" transform="rotate(15 335 295)" />
    <ellipse cx="230" cy="310" rx="14" ry="6" transform="rotate(-10 230 310)" />
    <ellipse cx="280" cy="310" rx="14" ry="6" transform="rotate(10 280 310)" />
  </g>

  <!-- A couple of olives (filled ovals) -->
  <g fill="#1F7A8C">
    <ellipse cx="200" cy="245" rx="9" ry="14" />
    <ellipse cx="305" cy="245" rx="9" ry="14" />
    <ellipse cx="252" cy="335" rx="9" ry="14" />
  </g>

  <!-- Wordmark: BLUE HAVEN -->
  <text x="250" y="495" text-anchor="middle"
        font-family="'Cormorant Garamond', 'Playfair Display', Georgia, serif"
        font-size="64" font-weight="600" letter-spacing="6" fill="#1F7A8C">
    BLUE HAVEN
  </text>
  <!-- Sub-wordmark: RESIDENCES with side rules -->
  <line x1="120" y1="540" x2="160" y2="540" stroke="#1F7A8C" stroke-width="3" stroke-linecap="round" />
  <text x="250" y="548" text-anchor="middle"
        font-family="'Cormorant Garamond', 'Playfair Display', Georgia, serif"
        font-size="26" font-weight="500" letter-spacing="10" fill="#1F7A8C">
    RESIDENCES
  </text>
  <line x1="340" y1="540" x2="380" y2="540" stroke="#1F7A8C" stroke-width="3" stroke-linecap="round" />
</svg>
